<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="HTT Enterprise Platform — Built on .NET 10 Blazor WebAssembly" />
  <meta name="theme-color" content="#0d1117" />

  <title>HTT Enterprise Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />

  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />

  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="HTT.BlazorWasm.App.styles.css" />

  <style>
    #htt-splash {
      position: fixed;
      inset: 0;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #htt-splash.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .splash-logo {
      font-family: 'Sora', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e8c97e 0%, #f5e6b8 50%, #c9a84c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
    }

    .splash-logo span {
      color: #4a90d9;
      -webkit-text-fill-color: #4a90d9;
    }

    .splash-bar-wrap {
      width: 240px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .splash-bar {
      height: 100%;
      background: linear-gradient(90deg, #c9a84c, #e8c97e);
      border-radius: 99px;
      animation: splashLoad 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes splashLoad {
      0% {
        width: 0%;
        opacity: 1;
      }

      60% {
        width: 75%;
      }

      85% {
        width: 92%;
      }

      100% {
        width: 100%;
      }
    }

    .splash-status {
      margin-top: 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    #blazor-error-ui {
      background: #1c1422;
      border: 1px solid #8b1a1a;
      border-radius: 0.5rem;
      bottom: 1.5rem;
      right: 1.5rem;
      left: auto;
      width: auto;
      max-width: 360px;
      padding: 1rem 1.25rem;
      position: fixed;
      z-index: 1100;
      display: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: #fca5a5;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    #blazor-error-ui .dismiss {
      cursor: pointer;
      float: right;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.25rem;
      line-height: 1;
      margin-left: 1rem;
      margin-top: -2px;
    }

    #blazor-error-ui .dismiss:hover {
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>

<body>

  <div id="htt-splash">
    <div class="splash-logo">HTT<span>.</span></div>
    <div class="splash-bar-wrap">
      <div class="splash-bar"></div>
    </div>
    <div class="splash-status">Initializing platform...</div>
  </div>

  <div id="app">
    <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="display:none">
      <defs>
        <filter id="f-noise">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
          <feColorMatrix type="saturate" values="0" />
          <feBlend in="SourceGraphic" mode="overlay" result="blend" />
          <feComposite in="blend" in2="SourceGraphic" />
        </filter>
      </defs>
    </svg>
  </div>

  <div id="blazor-error-ui">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    An error has occurred. <a href="" class="reload">Reload</a>
    <span class="dismiss">&#x2715;</span>
  </div>

  <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/components/tooltip.js"></script>
  <script src="js/layout.js"></script>

  <script src="_framework/blazor.webassembly.js" autostart="false"></script>
  <script>
    (async function () {
      await Blazor.start({
        loadBootResource: function (type, name, defaultUri, integrity) {
          return defaultUri;
        }
      });

      const splash = document.getElementById('htt-splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(() => splash.remove(), 450);
      }
    })();
  </script>

</body>

</html>
